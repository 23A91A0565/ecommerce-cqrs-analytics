services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: write_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - write_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d write_db"]
      interval: 10s
      timeout: 5s
      retries: 8

  read-db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: read_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - read_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d read_db"]
      interval: 10s
      timeout: 5s
      retries: 8

  broker:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  command-service:
    build: ./command-service
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://user:password@db:5432/write_db
      BROKER_URL: amqp://guest:guest@broker:5672/
      BROKER_QUEUE: analytics.events
      OUTBOX_POLL_INTERVAL_MS: 1000
      OUTBOX_BATCH_SIZE: 100
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  consumer-service:
    build: ./consumer-service
    depends_on:
      broker:
        condition: service_healthy
      read-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BROKER_URL: amqp://guest:guest@broker:5672/
      BROKER_QUEUE: analytics.events
      READ_DATABASE_URL: postgresql://user:password@read-db:5432/read_db
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/consumer_ready ]"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 25s

  query-service:
    build: ./query-service
    ports:
      - "8081:8081"
    depends_on:
      read-db:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8081
      READ_DATABASE_URL: postgresql://user:password@read-db:5432/read_db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

volumes:
  write_db_data:
  read_db_data:
